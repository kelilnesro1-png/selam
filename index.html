<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>አል አቅሷ መድረሳ - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans flex flex-col justify-between min-h-screen text-gray-800">

    <div class="bg-[#0d7a70] p-10 rounded-b-[50px] text-white text-center shadow-2xl">
        <div class="w-20 h-20 bg-yellow-300 rounded-[24px] mx-auto flex items-center justify-center shadow-lg mb-4 text-[#0d7a70]">
            <i class="fas fa-school text-3xl"></i>
        </div>
        <h1 class="text-2xl font-black tracking-wide italic text-yellow-300">አል አቅሷ መድረሳ</h1>
        <p class="text-xs text-teal-100 font-bold mt-1.5">የተማሪዎች ክትትልና የክፍያ መቆጣጠሪያ ሲስተም</p>
    </div>

    <div class="px-5 max-w-md mx-auto w-full space-y-4 my-auto py-8">
        <p class="text-[10px] font-black text-gray-400 uppercase text-center italic tracking-wider">ለመግባት አንዱን ይምረጡ</p>
        
        <a href="parent.html" class="flex items-center justify-between bg-white p-5 rounded-[30px] shadow-sm border border-gray-100 hover:shadow-md transition-all active:scale-95 duration-200">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-700 text-lg">
                    <i class="fas fa-user-friends"></i>
                </div>
                <div>
                    <h3 class="font-black text-gray-800 text-sm">የወላጅ ገጽ</h3>
                    <p class="text-[10px] text-gray-400 font-bold">የክትትልና ውጤት መረጃ መመልከቻ</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
        </a>

        <a href="teacher.html" class="flex items-center justify-between bg-white p-5 rounded-[30px] shadow-sm border border-gray-100 hover:shadow-md transition-all active:scale-95 duration-200">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-teal-50 rounded-2xl flex items-center justify-center text-[#0d7a70] text-lg">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div>
                    <h3 class="font-black text-gray-800 text-sm">የአስተማሪ ገጽ</h3>
                    <p class="text-[10px] text-gray-400 font-bold">የዕለት ተዕለት መገኘትና ውጤት መመዝገቢያ</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
        </a>

        <a href="admin.html" class="flex items-center justify-between bg-white p-5 rounded-[30px] shadow-sm border border-gray-100 hover:shadow-md transition-all active:scale-95 duration-200">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-800 text-lg">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <h3 class="font-black text-gray-800 text-sm">የአድሚን ገጽ (Secure)</h3>
                    <p class="text-[10px] text-gray-400 font-bold">ተማሪ ለመመዝገብና ክፍያ ለመቆጣጠር</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
        </a>
    </div>

    <div class="text-center pb-6 text-gray-400 font-bold text-[9px] tracking-widest italic">
        POWERED BY SAFE SCHOOL &copy; 2026
    </div>

</body>
</html>
